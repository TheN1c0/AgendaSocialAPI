
services:
  postgres:
    image: postgres:15-alpine
    container_name: gestorcasos-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gestorcasos
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: .
    container_name: gestorcasos-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gestorcasos
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      CLIENT_URL: ${CLIENT_URL}
      PORT: 5000
    depends_on:
      - postgres
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
